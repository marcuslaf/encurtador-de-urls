spring.application.name=url-shortener
server.port=8080

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/urlshortener
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_HOST_PORT:6379}
spring.data.redis.timeout=2000ms

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.short-code.length=7
app.default-expiration-minutes=1440
app.rate-limit.capacity=10
app.rate-limit.refill-tokens=1
app.rate-limit.refill-period-seconds=6
app.api-key=${APP_API_KEY:}

spring.threads.virtual.enabled=true

management.endpoints.web.exposure.include=health,info
logging.level.com.example.urlshortener=INFO
