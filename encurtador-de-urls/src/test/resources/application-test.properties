spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener_test
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cache.type=redis
spring.cache.redis.time-to-live=86400000

app.base-url=http://localhost:8080
app.short-code.length=7
app.default-expiration-minutes=1440
app.rate-limit.capacity=10
app.rate-limit.refill-tokens=1
app.rate-limit.refill-period-seconds=6

logging.level.com.example.urlshortener=DEBUG
logging.level.org.testcontainers=INFO